services:
    - type: web
      name: dy-shows-bot
      env: node
      region: oregon
      buildCommand: npm install
      startCommand: npm start
      envVars:
        - key: BOT_TOKEN
          sync: false
        - key: ADMIN_ID
          sync: false
        - key: SUPABASE_URL
          sync: false
        - key: SUPABASE_SERVICE_KEY
          sync: false
        - key: SESSION_SECRET
          sync: false
        - key: NODE_ENV
          value: production
  